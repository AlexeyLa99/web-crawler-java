# =============================================================================
# EXECUTION TEST PENALTIES  —  Student Reference Guide
# =============================================================================
#
# Format:  TEST_ID  PENALTY_POINTS   # explanation
#
# These tests are run by  run_tests.sh <your-jar>.
# A local Python HTTP server (server.py, port 9090) is started automatically
# for Sections B–I; Section A runs without a network connection.
#
# The server topology used in Sections B–I:
#
#   /root (depth 0)  ──► /page-a   (depth 1, 200, "thread and pattern.")
#                    ──► /page-b   (depth 1, 200, "no keywords here.", loops back to /root)
#                    ──► /page-c   (depth 1, 404)
#                    ──► /broken-404 (depth 1, 404)
#   /page-a          ──► /page-b   (depth 2 from above path)
#                    ──► /deep-1   (depth 2, 200, "java java java pattern.")
#   /deep-1          ──► /deep-2   (depth 3, 200, "thread thread.")
#
#   Word counts for 200-status pages:
#     /root=3  /page-a=3  /page-b=3  /deep-1=4  /deep-2=2
#
# Section point totals (must sum to exactly 100):
#   A  Argument Validation   14 pts   (9 penalised tests × 1–3 pts)
#   B  Crawl Depth           14 pts   (4 tests × 3–4 pts)
#   C  URL Deduplication     12 pts   (3 tests × 3–5 pts)
#   D  Error Handling         6 pts   (3 tests × 2 pts)
#   E  Analysis Correctness  31 pts   (14 tests × 1–3 pts)
#   F  Concurrency           14 pts   (4 tests × 1–5 pts)
#   G  URL Filtering          0 pts   (optional extension — informational only)
#   H  Output Formats         5 pts   (JSON mandatory 5 pts; CSV/text optional 0 pts)
#   I  Discovery Order        4 pts   (1 test × 4 pts)
#   Total                   100 pts
#
# NOTE: Execution score counts for 30 % of your overall grade.
#       Tests A-01, A-02, A-03 are run but carry 0 penalty (not listed here).
# =============================================================================


# =============================================================================
# A — Argument Validation
# =============================================================================
# These tests run without starting the HTTP server.  Your program must parse
# all flags before doing any network I/O, and must exit non-zero with an
# informative message for every invalid or missing argument.
#
# Tests A-01 (missing --analysis), A-02 (missing --poolsize), A-03 (missing
# --depth) are checked for a non-zero exit only — no penalty points.
# -----------------------------------------------------------------------------

# A-04  1 pt
# Command: java -jar ... --analysis WORD_COUNT --poolsize 0 --depth 0 --input <f> --output <f>
# Expected: exit code 1 AND stderr (or stdout) contains the exact string
#   "invalid pool size"
# Common mistake: accepting 0 as a valid pool size, or printing a different
#   error message (e.g. "pool size must be positive" — the spec text is exact).
A-04 1  # --poolsize 0: exit 1, print "invalid pool size"

# A-05  1 pt
# Command: java -jar ... --poolsize -3
# Expected: exit code 1 AND output contains "invalid pool size"
# Same requirement as A-04 but with a negative value.
A-05 1  # --poolsize -3: exit 1, print "invalid pool size"

# A-06  1 pt
# Command: java -jar ... --poolsize abc
# Expected: exit code 1 AND output contains "invalid pool size"
# The value is not a valid integer; your parser must catch the NumberFormatException
# (or equivalent) and emit the required message.
A-06 1  # --poolsize abc: exit 1, print "invalid pool size"

# A-07  1 pt
# Command: java -jar ... --depth -1
# Expected: exit code 1 AND output contains "invalid depth"
# Depth must be ≥ 0; negative values are not meaningful for BFS level limiting.
A-07 1  # --depth -1: exit 1, print "invalid depth"

# A-08  1 pt
# Command: java -jar ... --depth xyz
# Expected: exit code 1 AND output contains "invalid depth"
# Non-integer depth value — parse error must be caught and reported.
A-08 1  # --depth xyz: exit 1, print "invalid depth"

# A-09  3 pts
# Command: java -jar ... --analysis "WORD_COUNT,FOOBAR" --depth 0 --input <seed> --output <file>
# Expected: exit code 0, AND:
#   1. stderr (or stdout) contains "FOOBAR is unknown"
#   2. Output JSON has .analysis.WORD_COUNT present
#   3. .pages has exactly 1 entry (the seed, fetched at depth=0)
#   4. .pages[0].status == 200
# The valid analysis (WORD_COUNT) must still run; only FOOBAR is skipped.
# Common mistake: aborting the entire crawl instead of continuing with
#   the remaining valid analysis type.
A-09 3  # mixed valid+unknown analysis: warn about unknown, continue with valid

# A-10  3 pts
# Command: java -jar ... --analysis "FOOBAR,BADNAME" --depth 0 --input <seed> --output <file>
# Expected: exit code 1, AND output contains ALL of:
#   "FOOBAR is unknown"
#   "BADNAME is unknown"
#   "no valid analysis"
# When every requested analysis type is unknown, the program must exit.
# Each unknown name must be logged individually before the final fatal message.
A-10 3  # all analysis types unknown: log each, then exit 1 with "no valid analysis"

# A-11  2 pts
# Command: java -jar ... --input /tmp/__non_existent_file__.txt
# Expected: exit code 1 AND output contains "invalid input file"
# The seeds file must be validated for existence before any network I/O begins.
A-11 2  # non-existent --input file: exit 1, print "invalid input file"

# A-12  2 pts
# Command: java -jar ... --output /tmp/__no_such_dir__/out.json
# Expected: exit code 1 AND output contains "error saving report"
# The parent directory of the output path does not exist; the write will fail.
# This message must be printed and the program must exit 1 gracefully.
A-12 2  # output path in non-existent directory: exit 1, print "error saving report"


# =============================================================================
# B — Crawl Depth
# =============================================================================
# Depth controls how many BFS levels are followed from seed URLs.
# depth=0  → fetch seed only, do not follow any links
# depth=1  → fetch seed + its direct link targets
# depth=N  → fetch everything reachable in exactly N hops
#
# All B tests start from a single seed  http://localhost:9090/root
# and use WORD_COUNT analysis with poolsize=1 (single-threaded, deterministic).
# -----------------------------------------------------------------------------

# B-01  4 pts
# Command: --depth 0 --analysis WORD_COUNT
# Expected:
#   .pages | length == 1      (only /root; no links followed)
#   .pages[0].depth  == 0
#   .analysis.WORD_COUNT == 3 (/root text: "java is great." = 3 words)
# Common mistake: following links even at depth=0, or setting depth of the
#   seed page to 1 instead of 0.
B-01 4  # depth=0: only the seed URL is fetched; WORD_COUNT must equal 3

# B-02  4 pts
# Command: --depth 1 --analysis "WORD_COUNT,BROKEN_LINKS"
# Expected:
#   .pages | length == 5      (/root + /page-a + /page-b + /page-c + /broken-404)
#   .analysis.WORD_COUNT == 9 (root:3 + page-a:3 + page-b:3; 404 pages excluded)
#   .analysis.BROKEN_LINKS | length == 2 (/page-c and /broken-404)
# Note: 404 pages appear in .pages and in BROKEN_LINKS but do not contribute
#   to the word count.
B-02 4  # depth=1: seed + direct children; non-200 pages in BROKEN_LINKS, not counted

# B-03  3 pts
# Command: --depth 2 --analysis WORD_COUNT
# Expected:
#   .pages | length == 6      (/root /page-a /page-b /page-c /broken-404 /deep-1)
#   .analysis.WORD_COUNT == 13 (root:3 + page-a:3 + page-b:3 + deep-1:4)
#   max(.pages[].depth) == 2  (/deep-2 is at depth 3, must NOT be crawled here)
# Common mistake: crawling /deep-2 even though it requires 3 hops from /root.
B-03 3  # depth=2: /deep-1 reachable but /deep-2 (depth 3) must NOT appear

# B-04  3 pts
# Command: --depth 3 --analysis WORD_COUNT
# Expected:
#   .pages | length == 7      (adds /deep-2 to the depth=2 set)
#   .analysis.WORD_COUNT == 15 (+2 for /deep-2 "thread thread.")
#   max(.pages[].depth) == 3
# /page-b loops back to /root but /root is already visited — no duplicate.
B-04 3  # depth=3: /deep-2 now reachable; total word count = 15


# =============================================================================
# C — URL Deduplication
# =============================================================================
# Every URL must be processed at most once, determined atomically at discovery
# time (not after download).  Failures here often indicate a check-then-act
# race (non-atomic visited check) or no deduplication at all.
# assert_json_invariants (run on every B–I test) independently checks that
# no URL appears twice in the .pages array.
# -----------------------------------------------------------------------------

# C-01  4 pts
# Seed file lists http://localhost:9090/root TWICE.
# Expected:
#   .pages | length == 1   (URL visited exactly once)
#   .analysis.WORD_COUNT == 3
# The visited-URL registry must deduplicate seeds before submitting tasks.
C-01 4  # duplicate seed URL: crawled exactly once; pages list has 1 entry

# C-02  5 pts
# Seed: http://localhost:9090/page-b  (links to /root; /root links back to /page-b)
# Run with --depth 5.
# Expected: crawl terminates (no infinite loop), no duplicate pages in output.
# Common failure: program hangs forever because the circular-link cycle is not
#   broken by the visited set.  This carries the highest C penalty.
C-02 5  # circular link graph at depth=5: must terminate without duplicate pages

# C-03  3 pts
# Seed file has BOTH /root AND /page-a.
# /page-a is also a direct child of /root, so it could be submitted twice:
#   once as a seed at depth=0, and once as a child of /root at depth=1.
# Expected with --depth 1:
#   .pages | length == 6  (/root /page-a /page-b /page-c /broken-404 /deep-1)
#   /root appears exactly once, /page-a appears exactly once
#   .analysis.WORD_COUNT == 13
C-03 3  # overlapping multi-seed: /page-a appears once despite being seed + child of /root


# =============================================================================
# D — Error Handling
# =============================================================================
# The program must never crash on bad or problematic input.  In all three
# cases the program must exit 0 and continue processing any remaining valid
# seeds/pages.
# -----------------------------------------------------------------------------

# D-01  2 pts
# Seed file contains: "not-a-url", "ftp://example.com/file", "http://localhost:9090/root"
# Expected:
#   exit code 0
#   stderr (or stdout) contains "malformed" (for the two bad URLs)
#   .pages | length == 1   (only the valid http:// URL is crawled)
# The two non-http URLs must be skipped with a warning, not crash the program.
D-01 2  # malformed / non-http URLs in seed file: skip with "malformed" warning, crawl rest

# D-02  2 pts
# Seed file contains a URL pointing to localhost:1 (nothing is listening there)
# plus a valid http://localhost:9090/root seed.
# Expected:
#   exit code 0
#   stderr (or stdout) contains "failed" (for the unreachable URL)
#   .pages | length == 1   (only the live URL)
#   .analysis.WORD_COUNT == 3
# The unreachable URL must NOT appear in the .pages list at all.
D-02 2  # unreachable URL: print "<url> failed", continue; unreachable URL absent from pages

# D-03  2 pts
# Seed URL returns HTTP 404.
# Expected (with --analysis "WORD_COUNT,BROKEN_LINKS"):
#   .pages | length == 1
#   .pages[0].status == 404
#   .analysis.WORD_COUNT == 0   (404 pages don't contribute words)
#   .analysis.BROKEN_LINKS | length == 1
# A 404 seed must still appear in .pages (with the correct status code) and
# must appear in BROKEN_LINKS — it just contributes 0 to the word count.
D-03 2  # 404 seed: recorded in .pages with status 404, in BROKEN_LINKS, WORD_COUNT=0


# =============================================================================
# E — Analysis Correctness
# =============================================================================
# Page content served by server.py (exact visible text after Jsoup parsing):
#   /root             "java is great."                      3 words  java=1
#   /page-a           "thread and pattern."                 3 words  thread=1 pattern=1
#   /page-b           "no keywords here."                   3 words  (no keywords)
#   /deep-1           "java java java pattern."             4 words  java=3 pattern=1
#   /deep-2           "thread thread."                      2 words  thread=2
#   /javascript-trap  "javascript threading patterns        6 words  java=1 thread=1 pattern=1
#                      java thread pattern."                (prefixed/suffixed forms do NOT count)
#   /rich-html        "Concurrent Web Crawler               13 words java=1 thread=1 pattern=1
#                      Learn java and thread safety.        (script/style/comment NOT counted)
#                      Design pattern matters. Two words."
#   /uppercase-kw     "JAVA is great. THREAD safety.        7 words  java=1 thread=1 pattern=1
#                      PATTERN design."                     (must match case-insensitively)
# -----------------------------------------------------------------------------

# E-01  2 pts
# Command: --analysis WORD_COUNT --depth 1
# Expected:
#   .pages | length == 5
#   .analysis.WORD_COUNT == 9  (root:3 + page-a:3 + page-b:3; 404 pages excluded)
E-01 2  # WORD_COUNT at depth=1: must equal 9 (only 200-status pages counted)

# E-02  3 pts
# Command: --analysis BROKEN_LINKS --depth 1
# Expected:
#   .analysis.BROKEN_LINKS | length == 2
#   .analysis.BROKEN_LINKS[0] == "http://localhost:9090/page-c"
#   .analysis.BROKEN_LINKS[1] == "http://localhost:9090/broken-404"
# The ORDER must match first-discovery order: /page-c appears before /broken-404
# in /root's HTML, so it must be first in the list.
E-02 3  # BROKEN_LINKS: non-200 URLs listed in first-discovery order

# E-03  3 pts
# Command: --analysis BROKEN_LINKS --depth 0 (seed /root returns 200, no broken links found)
# Expected:
#   .analysis.BROKEN_LINKS | type == "array"
#   .analysis.BROKEN_LINKS | length == 0
# Returning null or omitting the key is a common serialisation bug.
# The spec explicitly requires an empty JSON array [] when there are no broken links.
E-03 3  # BROKEN_LINKS with no broken pages: must be [] (empty array), not null or absent

# E-04  2 pts
# Command: --analysis MOST_LINKED_DOMAIN --depth 0 (seed /root on localhost)
# Expected:
#   .analysis.MOST_LINKED_DOMAIN == "localhost"
# /root has 4 outgoing links, all on localhost → localhost wins.
E-04 2  # MOST_LINKED_DOMAIN basic: domain with the most outgoing links wins

# E-05  2 pts
# Seed file has both http://localhost:9090/root AND http://127.0.0.1:9090/root.
# Each page has 4 outgoing links, so "localhost" and "127.0.0.1" tie at 4.
# Expected:
#   .analysis.MOST_LINKED_DOMAIN == "127.0.0.1"
# Lexicographic tie-break: "127.0.0.1" < "localhost", so it must win.
E-05 2  # MOST_LINKED_DOMAIN tie: broken lexicographically ("127.0.0.1" < "localhost")

# E-06  1 pt
# All seeds return 404; no 200-status pages are ever fetched.
# Expected:
#   .analysis.MOST_LINKED_DOMAIN == null   (JSON null, not the string "null" or "")
# Only 200-status pages contribute outgoing-link counts.  When there are none,
# the result must be null — returning "" is a common bug.
E-06 1  # MOST_LINKED_DOMAIN with no 200 pages: must be JSON null, not "" or missing

# E-07  2 pts
# Command: --analysis KEYWORD_FREQUENCY --depth 0 (seed /root: "java is great.")
# Expected:
#   .analysis.KEYWORD_FREQUENCY.java == 1
#   .analysis.KEYWORD_FREQUENCY.thread == 0
#   .analysis.KEYWORD_FREQUENCY.pattern == 0
E-07 2  # KEYWORD_FREQUENCY basic count: java=1, thread=0, pattern=0 for /root

# E-08  2 pts
# Seed is a 404 page — no text to analyse at all.
# Expected: all three keys must still be present with value 0:
#   .analysis.KEYWORD_FREQUENCY.java == 0
#   .analysis.KEYWORD_FREQUENCY.thread == 0
#   .analysis.KEYWORD_FREQUENCY.pattern == 0
# Omitting a key with a zero count is a common implementation mistake.
E-08 2  # KEYWORD_FREQUENCY: all three keys (java/thread/pattern) present even when 0

# E-09  3 pts
# Seed is /javascript-trap whose visible text is:
#   "javascript threading patterns java thread pattern."
# Expected: java=1, thread=1, pattern=1
# "javascript" must NOT count as "java"; "threading" as "thread"; "patterns" as "pattern".
# The spec requires whole-word matching — use a \b<word>\b regex (or equivalent),
# NOT String.indexOf() or String.contains().
E-09 3  # KEYWORD_FREQUENCY whole-word: "javascript"!="java", "threading"!="thread", etc.

# E-10  2 pts
# Command: --analysis KEYWORD_FREQUENCY --depth 3 from /root
# 200-status pages reached: /root /page-a /page-b /deep-1 /deep-2
# Expected accumulated counts:
#   java:    /root(1) + /deep-1(3) = 4
#   thread:  /page-a(1) + /deep-2(2) = 3
#   pattern: /page-a(1) + /deep-1(1) = 2
E-10 2  # KEYWORD_FREQUENCY multi-page accumulation across depth=3 graph

# E-11  2 pts
# Seed is /no-html which returns HTTP 200 with Content-Type: application/json
# Expected: exit code 0 (program must not crash on non-HTML content)
# The program may optionally print a warning and skip the page, or process it
# silently.  No assertions on the JSON report contents — only that exit is 0.
E-11 2  # non-HTML 200 response (application/json): graceful skip, exit 0

# E-12  3 pts
# Seed is /rich-html which contains <script>, <style>, and <!-- HTML comment -->
# blocks that include the keywords java, thread, pattern.
# Expected (visible body text only, 13 words):
#   .pages[0].wordCount == 13
#   .analysis.WORD_COUNT == 13
#   .analysis.KEYWORD_FREQUENCY.java == 1    (not 2 — script must be excluded)
#   .analysis.KEYWORD_FREQUENCY.thread == 1  (not 2 — comment must be excluded)
#   .analysis.KEYWORD_FREQUENCY.pattern == 1 (not 2 — style must be excluded)
# Use Jsoup's body().text() which strips script/style/comment content.
E-12 3  # rich HTML: <script>, <style>, <!-- comment --> must NOT be word-counted

# E-13  2 pts
# Seed is /broken-500 which returns HTTP 500.
# Expected (with --analysis "WORD_COUNT,BROKEN_LINKS"):
#   .pages[0].status == 500
#   .analysis.BROKEN_LINKS | length == 1
#   .analysis.BROKEN_LINKS[0] == "http://localhost:9090/broken-500"
#   .analysis.WORD_COUNT == 0
# BROKEN_LINKS must capture ALL non-200 responses, not only 404.
# A common bug is checking  status == 404  instead of  status != 200.
E-13 2  # HTTP 500 must appear in BROKEN_LINKS (any non-200 status is "broken")

# E-14  2 pts
# Seed is /uppercase-kw: "JAVA is great. THREAD safety. PATTERN design."
# Expected:
#   .analysis.KEYWORD_FREQUENCY.java == 1
#   .analysis.KEYWORD_FREQUENCY.thread == 1
#   .analysis.KEYWORD_FREQUENCY.pattern == 1
# Matching must be case-insensitive.  A case-sensitive implementation would
# return 0 for all three when keywords appear only in uppercase.
E-14 2  # KEYWORD_FREQUENCY case-insensitive: "JAVA" must match keyword "java"


# =============================================================================
# F — Concurrency Correctness
# =============================================================================
# Your crawler must use a fixed-size thread pool (Executors.newFixedThreadPool)
# with the size supplied via --poolsize.  The visited-URL registry must be
# updated atomically (e.g. ConcurrentHashMap.add returning a boolean) so that
# no URL is processed more than once even under high parallelism.
# -----------------------------------------------------------------------------

# F-01  1 pt
# Command: --analysis WORD_COUNT --poolsize 1 --depth 3 from /root
# Expected: valid JSON output, no duplicate pages (as always checked by
#   assert_json_invariants).  This establishes the reference result that
#   multi-threaded runs in F-02 and F-03 must reproduce exactly.
F-01 1  # single-thread (poolsize=1) baseline: valid output, no structural errors

# F-02  5 pts
# Command: --analysis WORD_COUNT --poolsize 4 --depth 3
# Expected: exactly the same page count and WORD_COUNT total as F-01.
# Differing totals indicate a race condition in the shared word-count
# accumulator or in the visited set allowing duplicate page processing.
# This is the highest-value concurrency test.
F-02 5  # poolsize=4 must produce identical page count and WORD_COUNT as poolsize=1

# F-03  4 pts
# Command: --analysis WORD_COUNT --poolsize 8 --depth 3
# Expected: no duplicate URLs in .pages (checked by assert_json_invariants).
# 8 threads on a 7-page graph stresses the atomicity of the visited check.
F-03 4  # poolsize=8: no duplicate pages (check-then-act race must not occur)

# F-04  4 pts
# Seed: /one-hundred (200, links to /one-hundred-1 … /one-hundred-99)
# Command: --analysis WORD_COUNT --poolsize 4 --depth 1
# Expected:
#   .pages | length == 100
#   .analysis.WORD_COUNT == 199  (hub:"page."=1 + 99×leaf:"page N."=2)
# A 100-page graph exposes subtle races that a 7-page graph might miss.
F-04 4  # 100-page graph with 4 threads: correct page count (100) and word count (199)


# =============================================================================
# G — URL Filtering  (OPTIONAL extension — informational only, 0 penalty)
# =============================================================================
# Domain filtering (--domains host1,host2,...) is one of four optional
# extensions.  These tests run to confirm a correct implementation if you
# chose this extension, but failing them carries NO grade penalty.
# -----------------------------------------------------------------------------

# G-01  0 pts (informational)
# --domains localhost with seed on localhost: all pages pass the filter.
# Expected: .pages | length == 5  (same as B-02 without a filter)
G-01 0  # domain filter ALLOWS pages on the whitelisted domain (informational)

# G-02  0 pts (informational)
# Seed file has both localhost and 127.0.0.1 variants; --domains localhost only.
# Expected: only "localhost" pages in output; 127.0.0.1 seed silently dropped.
G-02 0  # domain filter BLOCKS pages on non-whitelisted domain (informational)


# =============================================================================
# H — Output Formats
# =============================================================================
# JSON output is mandatory.  CSV (--format csv) and plain-text (--format text)
# are optional extensions that carry 0 penalty when not implemented.
# -----------------------------------------------------------------------------

# H-01  2 pts
# Command: --format json (explicit)
# Expected: valid, well-structured JSON with top-level "pages" array and
#   "analysis" object.  assert_json_invariants checks full structure.
H-01 2  # --format json: output must be valid, well-structured JSON

# H-02  2 pts
# Each object in .pages must have ALL of these fields:
#   url, title, status, depth, wordCount, outgoingLinks, domain
# AND must NOT have:
#   rawText  (internal field — must never be serialised)
H-02 2  # JSON page objects: all required fields present, rawText must be absent

# H-03  0 pts (informational)
# --format csv: first line must be a header row containing "url" (case-insensitive)
# and there must be at least one data row.  Optional extension — 0 penalty.
H-03 0  # CSV format: header row with "url" + at least one data row (informational)

# H-04  0 pts (informational)
# --format text: output file must contain the crawled URL and the analysis
# strategy name somewhere in its content.  Optional extension — 0 penalty.
H-04 0  # text format: must contain the URL and analysis name (informational)

# H-05  1 pt
# Command: omit --format entirely
# Expected: output file is valid JSON (same as --format json)
# A common mistake is crashing or writing an empty file when no format is given.
H-05 1  # default output format (no --format flag) must be valid JSON


# =============================================================================
# I — Discovery Order
# =============================================================================
# Pages in the output must appear in first-discovery order: the order in which
# each URL was first encountered (queued) during the BFS traversal, not the
# order in which HTTP responses arrived.  With poolsize=1 this is fully
# deterministic and matches the order links appear in the HTML source.
# -----------------------------------------------------------------------------

# I-01  4 pts
# Command: --poolsize 1 --depth 1 from /root
# /root is the seed → first page.  /page-a is the first link in /root's HTML →
# second page.  The test checks .pages[0] and .pages[1] by exact URL.
# A common bug is sorting by finish time instead of discovery time.
I-01 4  # pages in first-discovery (BFS enqueue) order, not HTTP response order
